<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantalla Principal</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --accent: #35b8f1;           /* ← CAMBIADO: era #c8f135 (verde-lima), ahora azul claro */
    --text: #f0ece4;
    --muted: #444450;
    --bubble-bg: rgba(53,184,241,0.06);       /* ← CAMBIADO: mismo alpha, color azul */
    --bubble-border: rgba(53,184,241,0.22);   /* ← CAMBIADO */
    --line-color: rgba(53,184,241,0.38);      /* ← CAMBIADO */
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(53,184,241,0.022) 1px, transparent 1px),   /* ← CAMBIADO */
      linear-gradient(90deg, rgba(53,184,241,0.022) 1px, transparent 1px); /* ← CAMBIADO */
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top-right room code badge ───────────────────────────── */
  #room-badge {
    position: fixed;
    top: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 200;
    background: rgba(10,10,15,0.75);
    border: 0.5px solid rgba(53,184,241,0.2);   /* ← CAMBIADO */
    border-radius: 8px;
    padding: 8px 16px 8px 12px;
    backdrop-filter: blur(12px);
  }

  #room-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.4s, box-shadow 0.4s;
  }
  #room-dot.online     { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
  #room-dot.connecting { background: #f5a623; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #badge-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1px;
  }

  #room-label-small {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(53,184,241,0.45);   /* ← CAMBIADO */
    text-transform: uppercase;
    line-height: 1;
  }

  #room-code {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 6px;
    line-height: 1;
  }

  /* ── Top-left host label ─────────────────────────────────── */
  #host-label {
    position: fixed;
    top: 16px;
    left: 20px;
    z-index: 200;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(240,236,228,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(10,10,15,0.6);
    padding: 6px 10px;
    border-radius: 6px;
    backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.05);
  }

  /* ── Bottom connection count ─────────────────────────────── */
  #conn-badge {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(240,236,228,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #conn-count { color: var(--accent); font-weight: 700; font-size: 14px; }

  /* ── Waiting message ────────────────────────────────────── */
  #waiting-msg {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(53,184,241,0.3);   /* ← CAMBIADO */
    font-family: 'Space Mono', monospace;
    letter-spacing: 2px;
    white-space: nowrap;
    animation: fadeWait 2.5s ease-in-out infinite;
    z-index: 100;
  }
  @keyframes fadeWait { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* ── Canvas ─────────────────────────────────────────────── */
  #canvas {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  svg#lines {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  /* ── Bubbles (circles) ──────────────────────────────────── */
  .bubble {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--bubble-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bubble-bg);
    transform: translate(-50%, -50%);
    backdrop-filter: blur(8px);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: border-color 0.5s, box-shadow 0.5s, background 0.5s;
    will-change: left, top;
  }

  .bubble.connected {
    border-color: rgba(53,184,241,0.65);                              /* ← CAMBIADO */
    background: rgba(53,184,241,0.09);                                /* ← CAMBIADO */
    box-shadow: 0 0 22px rgba(53,184,241,0.14), inset 0 0 18px rgba(53,184,241,0.04); /* ← CAMBIADO */
  }

  .bubble .b-name {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: rgba(53,184,241,0.55);   /* ← CAMBIADO */
    text-transform: uppercase;
    margin-bottom: 4px;
    line-height: 1;
  }

  .bubble .b-text {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    word-break: break-word;
    padding: 0 10px;
  }

  @keyframes popIn {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.35); }
    70%  { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .bubble { animation: popIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  /* ── Connection lines ───────────────────────────────────── */

  /* ── QR Badge (top-left) ─────────────────────────────────── */
  #qr-badge {
    position: fixed;
    top: 16px;
    left: 20px;
    z-index: 200;
    background: rgba(10,10,15,0.75);
    border: 0.5px solid rgba(53,184,241,0.2);
    border-radius: 10px;
    padding: 10px;
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #qr-label {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    letter-spacing: 2.5px;
    color: rgba(53,184,241,0.45);
    text-transform: uppercase;
    line-height: 1;
  }

  #qr-canvas {
    border-radius: 4px;
    display: block;
  }

  .cline {
    stroke: var(--line-color);
    stroke-width: 1.5;
    stroke-linecap: round;
  }
</style>
</head>
<body>

<!-- ── QR de acceso al cliente ── -->
<div id="qr-badge">
  <canvas id="qr-canvas" width="100" height="100"></canvas>
  <span id="qr-label">escanear para unirse</span>
</div>

<div id="room-badge">
  <div id="room-dot" class="connecting"></div>
  <div id="badge-inner">
    <span id="room-label-small">sala</span>
    <span id="room-code">——</span>
  </div>
</div>

<div id="conn-badge">
  <span id="conn-count">0</span>
  <span>conectados</span>
</div>

<div id="canvas">
  <svg id="lines"></svg>
</div>

<div id="waiting-msg">esperando mensajes...</div>

<script>

  // ══════════════════════════════════════════════════════════
  //  CONFIGURACIÓN DEL QR
  //  Cambia CLIENT_URL por la URL de tu página cliente
  // ══════════════════════════════════════════════════════════
  const CLIENT_URL = 'https://botmaster515.github.io/Pruebas-Vinculo/';

  function generateQR(salaCode) {
    const url = CLIENT_URL + '?sala=' + salaCode;

    // Generar la matriz de datos del QR (sin dibujar en canvas todavía)
    QRCode.toDataURL(url, {
      width: 256,
      margin: 1,
      color: { dark: '#000000', light: '#ffffff' }
    }, (err, dataURL) => {
      if (err) { console.error('QR error:', err); return; }

      // Cargar como imagen temporal para leer los módulos
      const img = new Image();
      img.onload = () => {
        // Canvas auxiliar para leer píxeles
        const tmp    = document.createElement('canvas');
        tmp.width    = 256;
        tmp.height   = 256;
        const tctx   = tmp.getContext('2d');
        tctx.drawImage(img, 0, 0, 256, 256);
        const pixels = tctx.getImageData(0, 0, 256, 256).data;

        // Canvas visible
        const SIZE   = 140;
        const canvas = document.getElementById('qr-canvas');
        canvas.width  = SIZE;
        canvas.height = SIZE;
        const ctx    = canvas.getContext('2d');
        ctx.clearRect(0, 0, SIZE, SIZE);

        // Detectar tamaño de módulo leyendo cuántos píxeles blancos hay al inicio
        let moduleSize = 0;
        for (let i = 0; i < 256; i++) {
          const px = i * 4;
          if (pixels[px] < 128) { moduleSize = i; break; }
        }
        if (moduleSize < 2) moduleSize = 8;

        const modules = Math.round(256 / moduleSize);
        const cell    = SIZE / modules;
        const r       = cell * 0.44;

        // Gradiente radial azul
        const grad = ctx.createRadialGradient(SIZE/2, SIZE/2, 0, SIZE/2, SIZE/2, SIZE * 0.72);
        grad.addColorStop(0,   '#7dd8f8');
        grad.addColorStop(0.4, '#35b8f1');
        grad.addColorStop(0.8, '#2255bb');
        grad.addColorStop(1,   '#0a1040');

        for (let row = 0; row < modules; row++) {
          for (let col = 0; col < modules; col++) {
            // Samplear el centro del módulo en el canvas auxiliar
            const sx = Math.floor((col + 0.5) * moduleSize);
            const sy = Math.floor((row + 0.5) * moduleSize);
            const pi = (sy * 256 + sx) * 4;
            const isDark = pixels[pi] < 128;

            if (isDark) {
              const cx = (col + 0.5) * cell;
              const cy = (row + 0.5) * cell;
              ctx.fillStyle = grad;
              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      };
      img.src = dataURL;
    });
  }

  // ── Config ───────────────────────────────────────────────────────
  const MAX_BUBBLES    = 30;
  const TOP_PAD        = 56;
  const BOT_PAD        = 48;
  const MIN_SPEED      = 0.25;
  const MAX_SPEED      = 0.85;
  const DAMPING        = 0.994;
  const REPEL_K        = 0.55;
  const ATTRACT_K      = 0.00012;
  const CESAR_SHIFT    = 7;

  // ── State ────────────────────────────────────────────────────────
  let bubbles         = [];
  let clines          = [];
  let groups          = {};
  let peerConns       = {};
  let connCount       = 0;

  const roomDot       = document.getElementById('room-dot');
  const roomCodeEl    = document.getElementById('room-code');
  const connCountEl   = document.getElementById('conn-count');
  const canvas        = document.getElementById('canvas');
  const linesEl       = document.getElementById('lines');
  const waitingMsg    = document.getElementById('waiting-msg');

  // ── PeerJS ───────────────────────────────────────────────────────
  function initPeer() {
    const roomId = 'sala-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    const peer   = new Peer(roomId, {
      debug: 0,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun.cloudflare.com:3478' },
          { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
          { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
        ],
        iceCandidatePoolSize: 10
      }
    });

    peer.on('open', id => {
      const code = id.replace('sala-', '');
      roomCodeEl.textContent = code;
      roomDot.className = 'online';
      generateQR(code);   // genera el QR con el código real de la sala
    });

    peer.on('connection', conn => {
      const pid = conn.peer;
      peerConns[pid] = conn;
      connCountEl.textContent = ++connCount;

      conn.on('data', data => {
        if (data?.text) {
          // 'original' es la palabra sin cifrar, usada para agrupar burbujas iguales
          const groupKey = data.original || normalize(data.text);
          addBubble(data.text, data.name || 'anon', groupKey);
          for (const [id, c] of Object.entries(peerConns)) {
            if (id !== pid && c.open)
              c.send({ text: data.text, original: data.original, name: data.name || 'anon', broadcast: true });
          }
        }
      });

      conn.on('close',  () => { delete peerConns[pid]; connCountEl.textContent = Math.max(0, --connCount); });
      conn.on('error',  () => { delete peerConns[pid]; connCountEl.textContent = Math.max(0, --connCount); });
    });

    peer.on('error', () => { roomDot.className = 'connecting'; });
  }

  // ── Bubble helpers ───────────────────────────────────────────────
  const normalize = t => String(t).toLowerCase().trim();

  function calcRadius(text) {
    return Math.max(48, Math.min(100, String(text).length * 4.2 + 40));
  }

  function randVel() {
    const spd   = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
    const angle = Math.random() * Math.PI * 2;
    return { vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd };
  }

  function addBubble(text, name, groupKey) {
    waitingMsg.style.display = 'none';

    if (bubbles.length >= MAX_BUBBLES) {
      const old = bubbles.shift();
      old.el?.remove();
      evict(old);
    }

    const W  = window.innerWidth;
    const H  = window.innerHeight;
    const r  = calcRadius(text);
    const x  = r + Math.random() * (W - r * 2);
    const y  = TOP_PAD + r + Math.random() * (H - TOP_PAD - BOT_PAD - r * 2);
    const { vx, vy } = randVel();

    const el = document.createElement('div');
    el.className = 'bubble';
    el.style.cssText = `left:${x}px;top:${y}px;width:${r*2}px;height:${r*2}px`;
    el.innerHTML = `<div class="b-name">${esc(name)}</div><div class="b-text">${esc(cipher(text))}</div>`;
    canvas.appendChild(el);

    const key = groupKey || normalize(text);
    const entry = { el, x, y, vx, vy, radius: r, text, name, key };
    bubbles.push(entry);

    const grp = groups[entry.key] || (groups[entry.key] = []);
    for (const peer of grp) {
      addLine(entry, peer);
      entry.el.classList.add('connected');
      peer.el.classList.add('connected');
    }
    grp.push(entry);
  }

  function evict(b) {
    clines = clines.filter(c => {
      if (c.a === b || c.b === b) { c.el.remove(); return false; }
      return true;
    });
    const grp = groups[b.key];
    if (grp) {
      const i = grp.indexOf(b);
      if (i !== -1) grp.splice(i, 1);
      if (grp.length === 1) grp[0].el.classList.remove('connected');
      if (grp.length === 0) delete groups[b.key];
    }
  }

  function addLine(a, b) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    el.setAttribute('class', 'cline');
    linesEl.appendChild(el);
    clines.push({ a, b, el });
  }

  // ── Physics loop ─────────────────────────────────────────────────
  function animate() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const n = bubbles.length;

    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = bubbles[i], b = bubbles[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d  = Math.hypot(dx, dy) || 0.01;
        const minD = a.radius + b.radius + 8;
        if (d < minD) {
          const f = (minD - d) / d * REPEL_K * 0.012;
          a.vx -= dx * f;  a.vy -= dy * f;
          b.vx += dx * f;  b.vy += dy * f;
        }
      }
    }

    for (const c of clines) {
      const { a, b } = c;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.hypot(dx, dy) || 0.01;
      const restDist = a.radius + b.radius + 60;
      if (d > restDist) {
        a.vx += dx * ATTRACT_K;  a.vy += dy * ATTRACT_K;
        b.vx -= dx * ATTRACT_K;  b.vy -= dy * ATTRACT_K;
      }
    }

    for (const b of bubbles) {
      b.vx *= DAMPING;
      b.vy *= DAMPING;

      let spd = Math.hypot(b.vx, b.vy) || MIN_SPEED;
      if (spd < MIN_SPEED) { const s = MIN_SPEED / spd; b.vx *= s; b.vy *= s; }
      if (spd > MAX_SPEED) { const s = MAX_SPEED / spd; b.vx *= s; b.vy *= s; }

      b.x += b.vx;
      b.y += b.vy;

      if (b.x - b.radius < 0)       { b.x = b.radius;        b.vx =  Math.abs(b.vx); }
      if (b.x + b.radius > W)       { b.x = W - b.radius;    b.vx = -Math.abs(b.vx); }
      if (b.y - b.radius < TOP_PAD) { b.y = TOP_PAD+b.radius; b.vy =  Math.abs(b.vy); }
      if (b.y + b.radius > H)       { b.y = H - b.radius;    b.vy = -Math.abs(b.vy); }

      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
    }

    for (const c of clines) {
      const { a, b } = c;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.hypot(dx, dy) || 0.01;
      const nx = dx / d, ny = dy / d;
      c.el.setAttribute('x1', a.x + nx * a.radius);
      c.el.setAttribute('y1', a.y + ny * a.radius);
      c.el.setAttribute('x2', b.x - nx * b.radius);
      c.el.setAttribute('y2', b.y - ny * b.radius);
    }

    requestAnimationFrame(animate);
  }

  // El texto ya llega cifrado desde el cliente — el host lo muestra tal cual
  function cipher(str) { return str; }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ─────────────────────────────────────────────────────────
  initPeer();
  animate();
</script>
</body>
</html>
